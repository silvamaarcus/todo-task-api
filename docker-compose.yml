version: "3"

services:
  postgres:
    image: postgres
    container_name: todo-task-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo-task
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql

  postgres-test:
    image: postgres
    container_name: todo-task-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo-task
    ports:
      - "5433:5432"
    volumes:
      - ./.postgres-test-data:/var/lib/postgresql
